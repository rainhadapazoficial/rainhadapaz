name: Sincronização Diária de Notícias

on:
  schedule:
    - cron: '0 12 * * *'    # 08:00 Sinop (UTC-4)
    - cron: '0 19 * * *'    # 15:00 Sinop (UTC-4)
  workflow_dispatch:      # Permite rodar manualmente pelo painel do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Rodar Sincronização RCC Brasil
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync-rcc.ts
